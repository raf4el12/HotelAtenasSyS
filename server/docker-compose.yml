services:
  postgres:
    image: postgres:17-alpine
    container_name: hotel-atenas-db
    restart: unless-stopped
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: atenas_admin
      POSTGRES_PASSWORD: atenas_secret_2025
      POSTGRES_DB: hotel_atenas
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: hotel-atenas-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
